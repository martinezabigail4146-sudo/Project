<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 My Pet Gallery 🐾</title>

  <style>
    body {
      font-family: 'Poppins', 'Comic Sans MS', sans-serif;
      margin: 0;
      background: linear-gradient(180deg, #fff9f3 0%, #ffe3b3 100%);
      color: #4b3621;
      text-align: center;
    }

    header {
      background-color: #ffb347;
      background-image: linear-gradient(to right, #ffcc80, #ffa94d);
      color: white;
      padding: 25px 0;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      border-bottom: 5px solid #e69500;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 2.8em;
      text-shadow: 2px 2px #b5651d;
    }

    header p {
      font-size: 1.1em;
      color: #fff9f3;
    }

    /* 🌟 Gallery Grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto auto;
      grid-template-areas:
        "img1 img2 img3"
        "img4 img5 img6";
      gap: 25px;
      padding: 50px 8%;
    }

    .photo-card {
      background-color: #fffaf3;
      border-radius: 20px;
      border: 4px solid #f4a460;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .photo-card:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.25);
      cursor: pointer;
    }

    .photo-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-bottom: 3px solid #f4a460;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
    }

    .caption {
      padding: 15px;
      font-weight: bold;
      color: #5c4033;
      font-size: 1.1em;
      text-align: center;
    }

    .photo-card::before {
      content: "🐾";
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 1.5em;
      opacity: 0.4;
    }

    footer {
      background-color: #fff3d4;
      border-top: 3px dashed #e69500;
      padding: 25px 0;
      margin-top: 40px;
      color: #8b4513;
      font-size: 0.95em;
    }

    footer .icons {
      margin-top: 10px;
    }

    footer .icons span {
      font-size: 1.5em;
      margin: 0 8px;
      transition: transform 0.2s;
    }

    footer .icons span:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <header>
    <h1>🐾 My Pet Gallery 🐾</h1>
    <p>Meet my furry friends</p>
  </header>

  <div class="gallery">
    <div class="photo-card" style="grid-area: img1;">
      <img src="Neptune.png" alt="Neptune the Dog">
      <div class="caption">Neptune 🐶</div>
    </div>

    <div class="photo-card" style="grid-area: img2;">
      <img src="Canela.png" alt="Canela the Dog">
      <div class="caption">Canela 🐶</div>
    </div>

    <div class="photo-card" style="grid-area: img3;">
      <img src="Dante.png" alt="Dante the Cat">
      <div class="caption">Dante 🐶</div>
    </div>

    <div class="photo-card" style="grid-area: img4;">
      <img src="Omalley .png" alt="O'Malley the Cat">
      <div class="caption">O'Malley 🐱</div>
    </div>

    <div class="photo-card" style="grid-area: img5;">
      <img src="Oreo.png" alt="Oreo the Pet">
      <div class="caption">Oreo 🐾</div>
    </div>

    <div class="photo-card" style="grid-area: img6;">
      <img src="Fluffy.png" alt="Fluffy the Pet">
      <div class="caption">Fluffy 🐾</div>
    </div>
  </div>

  <footer>
    <p>Abigail Martinez</p>
    <div class="icons">
      <span>🐶</span><span>🐱</span><span>🐾</span><span>🦴</span>
    </div>
  </footer>
</body>
</html>
